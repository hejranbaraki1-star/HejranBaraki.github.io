<!DOCTYPE html>
<html>
<head>
    <title>Exercise 5 - CSS Basics</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .card {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        .highlight {
            background: #f1c40f;
            padding: 5px;
            border-radius: 3px;
        }
        .info-box {
            background: #eaf2f8;
            padding: 15px;
            border-left: 5px solid #3498db;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>CSS Styling Basics</h1>
        <p>This page shows different <span class="highlight">CSS styling</span> techniques.</p >
        
        <div class="info-box">
            <p><strong>What I learned:</strong></p >
            <ul>
                <li>Colors and backgrounds</li>
                <li>Fonts and text styling</li>
                <li>Box shadows and borders</li>
                <li>Gradients and hover effects</li>
            </ul>
        </div>
        
        <p style="color:#7f8c8d; font-style:italic;">CSS makes HTML pages beautiful!</p >
        <a href="workinwebprogramming.html ">← Back to Exercises</a >
    </div>
</body>
</html>
