        <h1> Exercise 3: Input and Output</h1>
        <p><strong>Description:</strong> Getting user input using scanf() and displaying output using printf().</p >
        <h3>Code:</h3>
        <pre>
#include &lt;stdio.h&gt;

int main() {
    int num;
    printf("Enter a number: ");
    scanf("%d", &num);
    printf("You entered: %d\n", num);
    return 0;
}
