<!DOCTYPE html>
<html>
<head>
    <title>Exercise 4 - Forms</title>
    <style>
        body {
            font-family: Arial;
            background: #ecf0f1;
            padding: 20px;
        }
        .form-container {
            background: white;
            max-width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1 style="text-align:center;color:#2c3e50;">Contact Form</h1>
        <form>
            <label>Full Name:</label>
            <input type="text" placeholder="Enter your name">
            
            <label>Email Address:</label>
            <input type="email" placeholder="Enter your email">
            
            <label>Your Message:</label>
            <textarea rows="4" placeholder="Write your message here..."></textarea>
            
            <button type="submit">Send Message</button>
        </form>
        <br>
        <a href="workinwebprogramming.html ">← Back to Exercises</a >
    </div>
</body>
</html>
