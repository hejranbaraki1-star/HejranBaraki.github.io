<!DOCTYPE html>
<html>
<head>
    <title>Exercise 3 - Tables & Lists</title>
    <style>
        body {
            font-family: Arial;
            background: #f9f9f9;
            padding: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 400px;
            margin: 20px 0;
        }
        th, td {
            border: 2px solid #2c3e50;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #3498db;
            color: white;
        }
        ul {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>HTML Tables and Lists</h1>
    
    <h2>My Favorite Subjects</h2>
    <ul>
        <li>Web Programming</li>
        <li>C Programming</li>
        <li>Data Structures</li>
        <li>Database Management</li>
    </ul>

    <h2>My Weekly Schedule</h2>
    <table>
        <tr>
            <th>Day</th>
            <th>Subject</th>
            <th>Time</th>
        </tr>
        <tr>
            <td>Monday</td>
            <td>Web Programming</td>
            <td>10:00 AM</td>
        </tr>
        <tr>
            <td>Tuesday</td>
            <td>C Programming</td>
            <td>2:00 PM</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td>Data Structures</td>
            <td>11:00 AM</td>
        </tr>
    </table>
    
    <a href="workinwebprogramming.html ">← Back to Exercises</a >
</body>
</html>
